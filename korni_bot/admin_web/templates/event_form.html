{% extends "base.html" %}
{% set active = "events" %}
{% block content %}
<h1>{% if event %}Редактировать мероприятие{% else %}Новое мероприятие{% endif %}</h1>

<div class="card">
<form method="post"
      action="{% if event %}/admin/events/{{ event.id }}/update{% else %}/admin/events/new{% endif %}"
      enctype="multipart/form-data">

    <div class="row">
        <div>
            <label>Название *</label>
            <input type="text" name="title" required value="{{ event.title if event else '' }}">
        </div>
        <div>
            <label>Категория *</label>
            <select name="category_id" required>
                {% for c in categories %}
                <option value="{{ c.id }}" {% if event and event.category_id==c.id %}selected{% endif %}>
                    {{ c.emoji or '' }} {{ c.title }}
                </option>
                {% endfor %}
            </select>
        </div>
    </div>

    <label>Описание</label>
    <textarea name="description">{{ event.description if event else '' }}</textarea>

    <label>Информация о преподавателе / ведущем</label>
    <textarea name="teacher_info">{{ event.teacher_info if event and event.teacher_info else '' }}</textarea>

    <div class="row">
        <div>
            <label>Дата и время</label>
            <input type="datetime-local" name="event_date"
                   value="{{ event.event_date.strftime('%Y-%m-%dT%H:%M') if event and event.event_date else '' }}">
        </div>
        <div>
            <label>Всего мест</label>
            <input type="number" name="total_seats" min="0" value="{{ event.total_seats if event else 0 }}">
        </div>
    </div>

    <label>Фото (jpg/png, до 10 МБ)</label>
    <input type="file" name="photo" accept="image/*">
    {% if event and event.photo_file_id %}
    <div class="muted" style="margin-top:6px">
        Фото уже загружено (file_id: <code>{{ event.photo_file_id[:24] }}…</code>)
        <label style="display:inline"><input type="checkbox" name="keep_photo" checked> оставить</label>
    </div>
    {% endif %}

    <label style="margin-top:16px">
        <input type="checkbox" name="is_active" {% if not event or event.is_active %}checked{% endif %}>
        Активно (показывать юзерам)
    </label>

    <div style="margin-top:20px">
        <button class="btn" type="submit">Сохранить</button>
        <a class="btn secondary" href="/admin/events">Отмена</a>
    </div>
</form>
</div>
{% endblock %}
