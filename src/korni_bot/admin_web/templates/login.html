<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Вход — Корни</title>
    <style>
        body { margin:0; min-height:100vh; display:grid; place-items:center;
               background:#f5f4ef; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
        .box { background:#fff; padding:32px; border-radius:12px; border:1px solid #e0dbd0;
               width:340px; box-shadow:0 2px 8px rgba(0,0,0,.04); }
        h1 { margin:0 0 20px; text-align:center; }
        label { display:block; margin-top:12px; font-size:13px; color:#555; }
        input { width:100%; padding:10px; border:1px solid #d6cfc0; border-radius:6px; font-size:14px; }
        button { width:100%; margin-top:20px; padding:10px; border:0; border-radius:6px;
                 background:#8b6f4e; color:#fff; font-size:15px; cursor:pointer; }
        .err { color:#b33a3a; font-size:13px; margin-top:10px; text-align:center; }
    </style>
</head>
<body>
<form class="box" method="post" action="/admin/login">
    <h1>🌱 Корни</h1>
    <label>Логин</label>
    <input type="text" name="login" autofocus required>
    <label>Пароль</label>
    <input type="password" name="password" required>
    <button type="submit">Войти</button>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
</form>
</body>
</html>
